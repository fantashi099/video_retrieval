syntax = "proto3";

package video_search;

service VideoSearchService {
  // Ingestion
  rpc IngestVideo(IngestRequest) returns (IngestResponse);
  
  // Search
  rpc SearchVideo(SearchRequest) returns (SearchResponse);
  
  // Job Status
  rpc GetJobStatus(JobStatusRequest) returns (JobStatusResponse);
  
  // List all videos
  rpc ListVideos(ListVideosRequest) returns (ListVideosResponse);
}

// Ingestion Messages
message IngestRequest {
  string video_url = 1;
}

message IngestResponse {
  string job_id = 1;
  string message = 2;
}

message JobStatusRequest {
  string job_id = 1;
}

message JobStatusResponse {
  string status = 1; // PENDING, PROCESSING, COMPLETED, FAILED
  string message = 2;
}

// Search Messages
message SearchRequest {
  string query_text = 1;
  int32 limit = 2;
  // Optional filters could be added here in the future
}

message SearchResult {
  string youtube_id = 1;
  int32 scene_idx = 2;
  float start_time = 3;
  float end_time = 4;
  float match_score = 5;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

// List Videos Messages
message ListVideosRequest {}

message VideoInfo {
  string youtube_id = 1;
  string title = 2;
  string url = 3;
  string status = 4;
  int32 duration = 5;
}

message ListVideosResponse {
  repeated VideoInfo videos = 1;
}
