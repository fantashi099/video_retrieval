syntax = "proto3";

package video_search;

service VideoSearchService {
  // Ingestion
  rpc IngestVideo(IngestRequest) returns (IngestResponse);
  
  // Search
  rpc SearchVideo(SearchRequest) returns (SearchResponse);
  
  // Job Status
  rpc GetJobStatus(JobStatusRequest) returns (JobStatusResponse);
  
  // List all videos
  rpc ListVideos(ListVideosRequest) returns (ListVideosResponse);
  
  // Parse batch file for preview
  rpc ParseBatchFile(ParseFileRequest) returns (ParseFileResponse);
  
  // Delete a video
  rpc DeleteVideo(DeleteVideoRequest) returns (DeleteVideoResponse);

  // List all jobs
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);

  // Delete a job
  rpc DeleteJob(DeleteJobRequest) returns (DeleteJobResponse);
}

// Ingestion Messages
message IngestRequest {
  string video_url = 1;
  string video_name = 2; // Custom name for the video
  bool force = 3;        // Force re-ingestion if already indexed
}

message IngestResponse {
  string job_id = 1;
  string message = 2;
}

message JobStatusRequest {
  string job_id = 1;
}

message JobStatusResponse {
  string status = 1; // PENDING, PROCESSING, COMPLETED, FAILED
  string message = 2;
}

// Search Messages
message SearchRequest {
  string query_text = 1;
  int32 limit = 2;
  bytes image_data = 3;  // Optional: image bytes for image-based search
}

message SearchResult {
  string youtube_id = 1;
  int32 scene_idx = 2;
  float start_time = 3;
  float end_time = 4;
  float match_score = 5;
  string video_name = 6;
  string ocr_text = 7;
  string asr_text = 8;
  repeated string tags = 9;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

// List Videos Messages
message ListVideosRequest {}

message VideoInfo {
  string youtube_id = 1;
  string title = 2;
  string url = 3;
  string status = 4;
  int32 duration = 5;
}

message ListVideosResponse {
  repeated VideoInfo videos = 1;
}

// Parse File Messages
message ParseFileRequest {
  bytes file_content = 1;
  string filename = 2;
}

message ParsedVideo {
  string video_name = 1;
  string url = 2;
}

message ParseFileResponse {
  repeated ParsedVideo videos = 1;
  string error_message = 2;
}

// Delete Video Messages
message DeleteVideoRequest {
  string youtube_id = 1;
}

message DeleteVideoResponse {
  bool success = 1;
  string message = 2;
}

// List Jobs Messages
message ListJobsRequest {
  int32 limit = 1;
}

message JobInfo {
  string id = 1;
  string url = 2;
  string status = 3;
  string message = 4;
  string video_name = 5;
}

message ListJobsResponse {
  repeated JobInfo jobs = 1;
}

message DeleteJobRequest {
    string job_id = 1;
}

message DeleteJobResponse {
    bool success = 1;
    string message = 2;
}
